name: Update grill docs

# Regenerates docs/SUPPORTED_GRILLS.md whenever the pytboss dependency
# version changes (typically via a Dependabot PR bumping requirements.txt),
# and pushes the regenerated file back onto that same PR branch.
#
# Uses pull_request_target (like auto-merge.yml) so the workflow has
# write permissions even though it may be triggered by Dependabot.

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
    paths:
      - requirements.txt

permissions:
  contents: write

jobs:
  update-grill-docs:
    runs-on: ubuntu-latest
    # Only bother running this for PRs that actually bump pytboss;
    # cheap grep check happens in the "check" step below.
    steps:
      - name: ⤵️ Check out PR head
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          # A token with write access to push back to the PR branch.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔍 Check whether pytboss version changed
        id: check
        run: |
          if git diff "origin/${{ github.event.pull_request.base.ref }}"...HEAD -- requirements.txt | grep -q '^[+-]pytboss=='; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-python@v7
        if: steps.check.outputs.changed == 'true'
        with:
          python-version-file: '.python-version'

      - name: 📦 Install dependencies
        if: steps.check.outputs.changed == 'true'
        run: |
          python -m pip install uv
          uv venv
          . .venv/bin/activate
          uv pip install -r requirements.txt

      - name: 📝 Regenerate docs/SUPPORTED_GRILLS.md
        if: steps.check.outputs.changed == 'true'
        run: |
          . .venv/bin/activate
          python3 -m scripts.generate_grill_docs

      - name: ⬆️ Commit and push changes
        if: steps.check.outputs.changed == 'true'
        run: |
          if git diff --quiet -- docs/SUPPORTED_GRILLS.md; then
            echo "No changes to docs/SUPPORTED_GRILLS.md"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/SUPPORTED_GRILLS.md
          git commit -m "docs: regenerate SUPPORTED_GRILLS.md for pytboss version bump"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
