name: Update grill docs

# Regenerates docs/SUPPORTED_GRILLS.md whenever the pytboss dependency
# version changes (typically via a Dependabot PR bumping requirements.txt),
# and pushes the regenerated file back onto that same PR branch.
#
# SECURITY: this uses pull_request_target so the job gets a token with
# write access to push back to the PR branch, but that means it must
# NEVER check out or execute untrusted (non-Dependabot) PR content with
# that token ("pwn request" pattern). We therefore:
#   - gate the whole job on the PR actor being dependabot[bot] (same
#     restriction auto-merge.yml uses for the same reason)
#   - never interpolate event data directly into a run: shell script
#     (branch names etc. are passed via env vars instead, since they
#     could otherwise be used for command injection)

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
    paths:
      - requirements.txt

permissions:
  contents: write

jobs:
  update-grill-docs:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: ⤵️ Check out PR head
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔍 Check whether pytboss version changed
        id: check
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          if git diff "origin/$BASE_REF"...HEAD -- requirements.txt | grep -q '^[+-]pytboss=='; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-python@v7
        if: steps.check.outputs.changed == 'true'
        with:
          python-version-file: '.python-version'

      - name: 📦 Install dependencies
        if: steps.check.outputs.changed == 'true'
        run: |
          python -m pip install uv
          uv venv
          . .venv/bin/activate
          uv pip install -r requirements.txt

      - name: 📝 Regenerate docs/SUPPORTED_GRILLS.md
        if: steps.check.outputs.changed == 'true'
        run: |
          . .venv/bin/activate
          python3 -m scripts.generate_grill_docs

      - name: ⬆️ Commit and push changes
        if: steps.check.outputs.changed == 'true'
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          if git diff --quiet -- docs/SUPPORTED_GRILLS.md; then
            echo "No changes to docs/SUPPORTED_GRILLS.md"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/SUPPORTED_GRILLS.md
          git commit -m "docs: regenerate SUPPORTED_GRILLS.md for pytboss version bump"
          git push origin "HEAD:$HEAD_REF"
